# Congo theme configuration

colorScheme = "congo"
defaultAppearance = "light"
autoSwitchAppearance = true

defaultThemeColor = "#FAF8F5"

enableSearch = true
enableCodeCopy = true
enableImageLazyLoading = true
enableImageWebp = true

fingerprintAlgorithm = "sha256"

[author]
  name = "Brico y Madera"
  headline = "Tu blog de referencia sobre bricolaje y trabajo con madera"
  bio = "Tutoriales, guías y consejos para empezar en carpintería"

  [[author.links]]
    github = "https://github.com/creyb"

[header]
  layout = "basic"
  showTitle = true

[footer]
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = false
  showScrollToTop = true

[homepage]
  layout = "page"
  showRecent = true
  recentLimit = 10

[article]
  showDate = true
  showDateUpdated = false
  showAuthor = false
  showBreadcrumbs = true
  showDraftLabel = true
  showEdit = false
  editAppendPath = true
  showHeadingAnchors = true
  showPagination = true
  invertPagination = false
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  showComments = false

[list]
  showBreadcrumbs = true
  showSummary = true
  showTableOfContents = false
  showTaxonomies = true
  groupByYear = false
  paginationWidth = 1

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true

[verification]
  google = ""
  bing = ""
  pinterest = ""
  yandex = ""
