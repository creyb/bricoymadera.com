{{/* Override: minimal header on homepage, default on other pages */}}
{{ if .IsHome }}
  <header>
    <div style="background-color: #E8DFD0;">
      {{ partials.Include "site-navigation.html" . }}
    </div>
  </header>
{{ else }}
  <header style="position: relative; background-image: url('/images/hero-workshop-bg.webp'); overflow: hidden; background-size: cover; background-position: center;">
    <div style="background: linear-gradient(135deg, rgba(30,20,10,0.85) 0%, rgba(45,30,15,0.8) 50%, rgba(60,40,20,0.75) 100%); {{ if .IsSection }}min-height: 320px; display: flex; flex-direction: column; justify-content: center;{{ else }}padding: 3rem 1.5rem 3.5rem;{{ end }}">
      {{ partials.Include "site-navigation.html" .}}
      <div style="text-align: center; {{ if .IsSection }}padding: 2rem 1.5rem 3rem; max-width: 700px; margin: 0 auto;{{ else }}padding: 2rem 1.5rem 2.5rem; max-width: 700px; margin: 0 auto;{{ end }}">
        <h1 style="font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 500; color: #FAF7F2; margin: 0 0 1rem; text-shadow: 0 2px 8px rgba(0,0,0,0.5);">
          {{ .Title | compare.Default .Site.Title }}
        </h1>
        {{ with .Params.description }}
          <p style="font-size: 1rem; color: #E8DFD0; text-shadow: 0 1px 4px rgba(0,0,0,0.4); line-height: 1.6;">
            {{ . }}
          </p>
        {{ end }}
      </div>
    </div>
  </header>
{{ end }}
