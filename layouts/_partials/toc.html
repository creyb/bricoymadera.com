{{ if .Params.toc | default true }}
{{ $toc := .TableOfContents }}
{{ if and $toc (gt (len $toc) 50) }}
<style>
  .toc { background: #fff; border: 1px solid rgba(61,43,31,0.1); border-radius: 10px; margin: 2rem 0; box-shadow: 0 2px 8px rgba(61,43,31,0.06); }
  .toc summary { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; color: #3D2B1F; padding: 1.25rem 1.5rem; cursor: pointer; list-style: none; display: flex; align-items: center; justify-content: space-between; user-select: none; }
  .toc summary::-webkit-details-marker { display: none; }
  .toc summary::after { content: "▸"; font-size: 0.8rem; color: #C17F24; transition: transform 0.2s ease; }
  .toc[open] summary::after { transform: rotate(90deg); }
  .toc-body { padding: 0 1.5rem 1.25rem; }
  .toc-body ul { list-style: none; margin: 0; padding: 0; }
  .toc-body li { margin-bottom: 0.35rem; padding-left: 1rem; position: relative; }
  .toc-body li::before { content: "›"; position: absolute; left: 0; color: #C17F24; font-weight: 600; }
  .toc-body a { color: #3D2B1F; text-decoration: none; font-size: 0.9rem; line-height: 1.5; display: block; padding: 0.15rem 0; transition: color 0.2s; }
  .toc-body a:hover { color: #C17F24; }
  .toc-body ul ul { padding-left: 1rem; margin-top: 0.25rem; }
  @media screen and (max-width: 600px) { .toc summary, .toc-body { padding-left: 1rem; padding-right: 1rem; } }
</style>
<details class="toc">
  <summary>Contenido del artículo</summary>
  <div class="toc-body">
    {{ $toc }}
  </div>
</details>
{{ end }}
{{ end }}
