{{ if .Params.toc | default true }}
{{ $toc := .TableOfContents }}
{{ if and $toc (gt (len $toc) 50) }}
<style>
  .toc ul { list-style: none; margin: 0; padding: 0; }
  .toc li { margin-bottom: 0.35rem; padding-left: 1rem; position: relative; }
  .toc li::before { content: "›"; position: absolute; left: 0; color: #C17F24; font-weight: 600; }
  .toc a { color: #3D2B1F; text-decoration: none; font-size: 0.9rem; line-height: 1.5; display: block; padding: 0.15rem 0; transition: color 0.2s; }
  .toc a:hover { color: #C17F24; }
  .toc ul ul { padding-left: 1rem; margin-top: 0.25rem; }
  @media screen and (max-width: 600px) { .toc { padding: 1rem !important; } }
</style>
<nav class="toc" aria-label="Tabla de contenidos" style="background: #fff; border: 1px solid rgba(61,43,31,0.1); border-radius: 10px; padding: 1.25rem 1.5rem; margin: 2rem 0; box-shadow: 0 2px 8px rgba(61,43,31,0.06);">
  <p style="font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; color: #3D2B1F; margin: 0 0 0.75rem;">Contenido del artículo</p>
  {{ $toc }}
</nav>
{{ end }}
{{ end }}
