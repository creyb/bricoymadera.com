{{ if .Params.howto }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": "{{ .Title }}",
  "description": "{{ .Description }}",
  "image": "{{ with .Params.image }}{{ . }}{{ else }}{{ .Site.BaseURL }}images/hero-workshop-bg.webp{{ end }}",
  "totalTime": "{{ .Params.totalTime | default "PT30M" }}",
  "step": [
    {{- $steps := .Params.howto }}
    {{- range $i, $step := $steps }}
    {{- if $i }},{{ end }}
    {
      "@type": "HowToStep",
      "position": {{ add $i 1 }},
      "name": "{{ $step.name }}",
      "text": "{{ $step.text }}"
    }
    {{- end }}
  ]
}
</script>
{{ end }}
