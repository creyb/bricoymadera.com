{{ if .Params.howto }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "image": {{ with .Params.image }}{{ . | jsonify }}{{ else }}{{ printf "%simages/hero-workshop-bg.webp" .Site.BaseURL | jsonify }}{{ end }},
  "totalTime": {{ .Params.totalTime | default "PT30M" | jsonify }},
  "step": [
    {{- $steps := .Params.howto }}
    {{- range $i, $step := $steps }}
    {{- if $i }},{{ end }}
    {
      "@type": "HowToStep",
      "position": {{ add $i 1 }},
      "name": {{ $step.name | jsonify }},
      "text": {{ $step.text | jsonify }}
    }
    {{- end }}
  ]
}
</script>
{{ end }}
