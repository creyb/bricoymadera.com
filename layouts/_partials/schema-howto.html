{{ if .Params.howto }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": "{{ .Title | transform.HTMLEscape }}",
  "description": "{{ .Description | transform.HTMLEscape }}",
  "image": "{{ with .Params.image }}{{ . | transform.HTMLEscape }}{{ else }}{{ printf "%simages/hero-workshop-bg.webp" .Site.BaseURL | transform.HTMLEscape }}{{ end }}",
  "totalTime": "{{ .Params.totalTime | default "PT30M" | transform.HTMLEscape }}",
  "step": [
    {{- $steps := .Params.howto }}
    {{- range $i, $step := $steps }}
    {{- if $i }},{{ end }}
    {
      "@type": "HowToStep",
      "position": {{ add $i 1 }},
      "name": "{{ $step.name | transform.HTMLEscape }}",
      "text": "{{ $step.text | transform.HTMLEscape }}"
    }
    {{- end }}
  ]
}
</script>
{{ end }}
