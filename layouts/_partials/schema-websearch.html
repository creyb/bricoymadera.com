{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title | transform.HTMLEscape }}",
  "url": "{{ .Site.BaseURL | transform.HTMLEscape }}",
  "description": "{{ .Site.Params.description | transform.HTMLEscape }}"
}
</script>
{{ end }}
