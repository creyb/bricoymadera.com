<nav role="navigation" class="site-nav" style="width: 100%; background-color: var(--color-wood-light);">
  <div class="nav-container" style="display: flex; align-items: center; padding: 0 2rem; min-height: 70px; max-width: 1200px; margin: 0 auto;">
    <a href="{{ .Site.Home.RelPermalink }}" class="hover-dark-brown no-underline" style="color: #3D2B1F; font-family: 'Lora', serif; font-size: 1.25rem; font-weight: 500; text-decoration: none; flex-shrink: 0;">
      {{ .Site.Title }}
    </a>
    <div style="flex: 1; display: flex; justify-content: center;">
      <a href="{{ .Site.Home.RelPermalink }}" class="hover-dark-brown no-underline" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
        <img src="/images/logo.webp" alt="Logo Brico y Madera" class="site-logo" width="87" height="70" loading="eager">
      </a>
    </div>
    <button class="menu-toggle" aria-label="Abrir menú" aria-expanded="false" style="display: none; background: none; border: none; cursor: pointer; padding: 0.5rem;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round">
        <line class="menu-open" x1="3" y1="6" x2="21" y2="6"></line>
        <line class="menu-open" x1="3" y1="12" x2="21" y2="12"></line>
        <line class="menu-open" x1="3" y1="18" x2="21" y2="18"></line>
        <line class="menu-close" x1="6" y1="6" x2="18" y2="18" style="display:none;"></line>
        <line class="menu-close" x1="6" y1="18" x2="18" y2="6" style="display:none;"></line>
      </svg>
    </button>
    <div class="nav-menu" style="display: flex; align-items: center; gap: 1.5rem; flex-shrink: 0;">
      {{ partials.Include "i18nlist.html" . }}
      {{ if .Site.Menus.main }}
        <ul style="list-style: none; margin: 0; padding: 0; display: flex; gap: 1.5rem;">
          {{ range .Site.Menus.main }}
          <li>
            <a class="hover-dark-brown no-underline" style="color: #3D2B1F; font-size: 1rem; font-family: 'Inter', sans-serif; text-decoration: none;" href="{{ .URL }}" title="{{ .Name }}">
              {{ .Name }}
            </a>
          </li>
          {{ end }}
        </ul>
      {{ end }}
      {{ partials.IncludeCached "social/follow.html" . }}
    </div>
  </div>
</nav>
