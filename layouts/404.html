{{ define "main" }}
  <section style="max-width: 600px; margin: 0 auto; padding: 6rem 1.5rem; text-align: center;">
    <p style="font-family: 'Lora', serif; font-size: 5rem; font-weight: 700; color: #C17F24; margin: 0 0 0.5rem; line-height: 1;">404</p>
    <h1 style="font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 600; color: #3D2B1F; margin: 0 0 1rem;">Página no encontrada</h1>
    <p style="font-size: 1.05rem; line-height: 1.7; color: #5a4a3a; margin: 0 0 0.5rem;">
      La página que buscas no existe o ha sido movida a otra ubicación.
    </p>
    <p style="font-size: 0.95rem; line-height: 1.7; color: #7a6a5a; margin: 0 0 2.5rem;">
      Puede que hayas escrito mal la URL o que el enlace que seguiste esté desactualizado.
    </p>
    <a href="/" style="display: inline-block; padding: 0.75rem 2rem; background-color: #C17F24; color: #fff; font-size: 1rem; font-weight: 600; border-radius: 6px; text-decoration: none; transition: background-color 0.2s ease, transform 0.1s ease;">Volver al inicio</a>
  </section>
{{ end }}
