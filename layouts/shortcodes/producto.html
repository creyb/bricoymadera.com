<div class="product-card">
  <div class="product-card-img">
    <img src="{{ .Get "img" }}" alt="{{ .Get "title" }}" width="200" height="200" loading="lazy">
  </div>
  <div class="product-card-body">
    <h4 class="product-card-title">{{ .Get "title" }}</h4>
    <div class="product-card-desc">{{ .Inner | markdownify }}</div>
  </div>
</div>
